<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <style>
    .calculator {
      width: 300px;
      background-color: black;
      padding: 20px;
      border-radius: 10px;
      font-family: Arial, sans-serif;
    }
    .display {
      color: white;
      text-align: right;
      font-size: 24px;
      padding: 10px;
    }
    input {
      background-color: white;
      width: 280px;
      border-radius: 5px;
      padding: 5px;
      text-align: center;
      margin-bottom: 10px;
    
    }
    button {
      width: 60px;
      height: 60px;
      margin: 5px;
      border-radius: 50%;
      font-size: 18px;
      border: none;
    }
    .orange {
      background-color: orange;
    }
    button{
           background-color: #666;
      color: white;
      
    }
  </style>
</head>
<body>
  <div class="calculator">
         <input type="text" placeholder="Welcome to Calculator">
    <div class="display">0</div>
   <div>
      <button style="color: black; font-weight: bold">AC</button>
      <button style="color: black; font-weight: bold">&#8592</button>
      <button style="color: black; font-weight: bold">%</button>
      <button class="orange" style="font-weight: bold">÷</butt;on>
    </div>
    <div>
      <button style="font-weight: bold">7</button>
      <button style="font-weight: bold">8</button>
      <button style="font-weight: bold">9</button>
      <button class="orange" style="font-weight: bold">X</button>
    </div>
    <div>
      <button style="font-weight: bold">4</button>
      <button style="font-weight: bold">5</button>
      <button style="font-weight: bold">6</button>
      <button class="orange" style="font-weight: bold">-</button>
    </div>
    <div>
      <button style="font-weight: bold">1</button>
      <button style="font-weight: bold">2</button>
      <button style="font-weight: bold">3</button>
      <button class="orange" style="font-weight: bold">+</button>
    </div>
    <div>
      <button style="font-weight: bold">0</button>
      <button style="font-weight: bold">00</button>
      <button style="font-weight: bold">.</button>
      <button class="orange" style="font-weight:bold">=</button>
    </div>
  </div>
</body>
</html>
