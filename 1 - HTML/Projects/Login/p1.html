<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body{
      /* background-color: #960893da; */
      background-color: rgb(142, 57, 170);
      margin-top: 60px;
    }
    .Login{
      
      width: 300px;
      height: 450px;
      display: flex;
      background-color:#fff;
      border-radius: 20px;  
      justify-self: center;
      box-shadow: 18px 22px 1.1px rgba(0, 0, 0, 0.253);      

      
    }
    label{

            font-weight: bold;
            font-size: small;
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            
    }
    input{
      width: 237px;
      height: 25px;
      border-radius: 4px;
      box-shadow: 3px 3px 0px black;

    }
    

    .head{
      
      text-align: center;
      color:rgb(135, 48, 163);
      /* font-weight: bold; */
      font-weight: 790;
      font-size:large;
      font-family: Arial, Helvetica, sans-serif;
      margin-bottom: 16px;
    }
    .content{
      padding: 21.5px;
    }
    .sub{
      width: 250px;
      height: 37px;
      border-radius: 80px;
      background-color:rgb(135, 48, 163);
            box-shadow: 2px 2px 0px black;
            font-weight: bold;

    }
    p{
      font-size: small;
      text-align: center;
      font-family:Verdana, Geneva, Tahoma, sans-serif;

      a[href^="#"]{
          color:rgb(135, 48, 163);

        font-weight: bold;
      }

      
    }

      
  </style>
</head>
<body>
  <form>

  <div class="Login" >

    <div class="content">
        <br>
    <br>
    <div class="head" >SIGN UP</div>

    <label> Name</label><br>
    
    <input type="text" placeholder="Enter your full name">
    <br><br>
    <label>Email</label><br>
    <input type="email"placeholder="Enter your Email" >
    <br><br>
    <label>Password</label><br>
    <input type="password" placeholder="Enter your Password">
    <br><br>
    <br>

    <button class="sub" type="submit">SIGN UP!</button><br><br><br>

<p>Have an Account? <a href="#">Login Here!</a></p>
  </div>
  </div>
  </form>
</body>
</html>
