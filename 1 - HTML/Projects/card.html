<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* .par{
            justify-content: center;
            align-items: center;
        } */
        .card{
            width: 300px;
            height: 160px;
            background: gray;
            border-radius: 7px;
            margin-left: 600px;
            margin-top: 200px; 
            display: flex;
            justify-content: center;
            align-items: center;  
            
        }
        p{
         color: white;
         font-size: x-small;
         margin-left: -150px;
         margin-top: 70px;
        }
        h6{
            color: white;
            margin-left: -50px;
            letter-spacing: 10px;
        }

        @media (hover: hover) and (pointer: fine) {
            .hover-effect {
                transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            }

             .hover-effect:hover {
                 background-color: rgb(12, 5, 2);
                 transform: translateY(-10px);
                 box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            }
        }

    </style>
</head>
<body>
    <!-- <div class="par"> -->
    <div class="card hover-effect">
        <h6>0999 0454 00xx</h6>
        <p>MUHAMMED JASIL </p>

    </div>
    <!-- </div> -->
</body>
</html>
