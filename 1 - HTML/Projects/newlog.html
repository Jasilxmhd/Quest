<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #4a454525;
    }

    .log {
      width: 290px;
      height: 350px;
      border: 1px solid black;
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background-color: #fff;
      border: none;
      /* box-shadow: 2px 2px 2px rgb(33, 4, 178); */
      box-shadow: 0 0 8px rgb(0, 0, 0) ;
    }

    p {
      text-align: center;
      font-weight: bold;
      margin-top: -50px;
      font-size: x-large;
      font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    }

    input[type="text"],
    input[type="password"] {
      
      width: 90%;
      height: 30px;
      border-radius: 4px;
      border: 1px solid rgb(204, 204, 204);
      padding: 5px;
    }

.login-btn {
  width: 90%;
  height: 35px;
  border-radius: 5px;
  background-color: rgba(33, 17, 215, 0.881);
  color: #ffffff;
  border: none;
  cursor: pointer;
  transition: background-color 0.3s ease, box-shadow 0.3s ease;
}

.login-btn:hover {
  background-color: rgb(10, 10, 90); /* Slightly stronger */
}

      .line {
        height: 1px;
        background-color: #a8a8a8;
        width: 150px;             
        }
  </style>
</head>
<body>
  <div class="log">
    <p>Login Page</p>
    <input type="text" placeholder="Phone number, username, or email">
    <input type="password" placeholder="Password">
    <input type="button" value="Login" class="login-btn"><br>
    <div class="line"></div>
    
</body>
</html>
