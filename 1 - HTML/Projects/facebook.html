<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flatpickr Date Picker</title>
  <!-- Flatpickr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
    }
    label {
      font-weight: bold;
    }
    input {
      padding: 8px;
      font-size: 16px;
      width: 200px;
    }
  </style>
</head>
<body>

  <label for="datepicker">Select a date:</label><br><br>
  <input id="datepicker" type="text" placeholder="YYYY-MM-DD">

  <!-- Flatpickr JS -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    flatpickr("#datepicker", {
      dateFormat: "Y-m-d"
    });
  </script>

</body>
</html>
