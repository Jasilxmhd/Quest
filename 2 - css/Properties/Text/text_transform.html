<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Decoration</title>

    <!-- Text Transform -->

    <style>

        h2{
            text-transform: uppercase;
        }
        h3{
            text-transform: lowercase;
        }
    </style>
</head>
<body>

    <h2>Calicut</h2>
    <br>
    <br>
    <h3>CALICUT</h2>


    
</body>
</html>
