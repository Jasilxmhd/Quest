<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relative Position</title>

    <style>

                    
        #d1{
            width: 200px;
            height: 200px;
            background-color:#fa0707;
            position: relative; 
            top: 50px;
            z-index: 2;
            
      
        }
        #d2{
            width: 200px;
            height: 200px;
            background-color: #1008ff;
            position: relative;
            z-index: 0;
   
        }
     
    </style>
</head>
<body>
    
    <div id="d1"></div>
    <div id="d2"></div>
</body>
</html>
