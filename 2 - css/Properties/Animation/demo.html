<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>

    <style>
        div{
            width: 200px;
            height: 200px;
            background: lightblue;
            position: relative;
            animation-name: sample;
            animation-duration: 10s;
        }
        @keyframes sample{
            0%{background-color:lightblue ;left: 0px; top: 100px;}
            20%{background-color:rgb(23, 27, 29) ;left: 200px; top: 0px;}
            50%{background-color: yellow; left: 0px; top: 200px;}
            100%{background-color: blue;left: 0px; top:0px ;}
        }
    </style>
</head>
<body>

    <div></div>
    
</body>
</html>
