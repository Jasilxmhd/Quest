<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="style.css"> -->

    <style>
        .d1{
            width: 200px;
            height: 200px;
            background: rgb(5, 95, 124);
            animation-name: demo;
            animation-duration: 10s;
            animation-delay: 1s;
            position: relative;
            animation-iteration-count: infinite;
            /* animation-play-state: paused; */
            /* animation-play-state: running; */
            /* animation-direction: alternate; */
            /* animation-direction: alternate-reverse; */
            /* animation-fill-mode: forwards; */
            /* animation-fill-mode: backwards; */              /* defualt */
            
            /* Timing Function */
            animation-timing-function: linear;              /* Smooth  */
            animation-timing-function: ease;                /* slow fast slow  */
            animation-timing-function: ease-in;             /* slow fast  */
            animation-timing-function: ease-out;            /* fast slow  */
            animation-timing-function: ease-in-out;         /* fast slow  */

            
            
        }
        .d2{
            width: 200px;
            height: 200px;
            background: rgb(8, 141, 23);
            animation-name: sample;
            animation-duration: 10s;
            animation-delay: 1s;
            position: relative;
            animation-iteration-count: infinite;
            animation-timing-function: ease;

        }




        @keyframes demo{
            0%{background-color: red;left: 200px; top: 0px;}
            20%{background-color: rgb(39, 241, 32);left: 200px; top: 100px;}
            50%{background-color: rgb(38, 13, 227);left: 250px; top: 150px;}
            100%{background-color: rgb(219, 205, 15);left: 0px; top: 0px;}
        }
        @keyframes sample{
            0%{background-color: red;left: 600px; top: 0px;}
            20%{background-color: rgb(39, 241, 32);left: 400px; top: 100px;}
            50%{background-color: rgb(38, 13, 227);left: 250px; top: 50px;}
            100%{background-color: rgb(219, 205, 15);left: 0px; top: 0px;}
        }
    </style>
</head>
<body>
    <div class="d1"></div><br>
    <div class="d2"></div>

</body>
</html>
