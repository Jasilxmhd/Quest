<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            display: flex;
            gap: 20px;
        }

        .box{
            width: 150px;
            height: 150px;
            background: rgb(35, 32, 197);
            color: white;
            font-size: 20px;
            display: flex;
            justify-content:center;
            align-items: center;
            
           
            
        }

        @media(max-width:600px){
            .container{
            flex-direction: column;
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">box 1</div>
        <div class="box">box 2</div>
        <div class="box">box 3</div>  
    </div>
</body>
</html>
