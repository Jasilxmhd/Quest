<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attributes</title>

     <!-- [attr ^ = "value"] -->

      <style>
        a[href^="https"]{
            color: green;
        }

      </style>
</head>
<body>

    <a href="https://www.google.com/">Link</a>
    
</body>
</html>
