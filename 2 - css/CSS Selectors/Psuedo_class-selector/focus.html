<!DOCTYPE html>
<html>
<head>
  <title>Focus</title>

            <!-- Focus -->
  <style>
    input:focus{
        width: 30%;
    }
    

    input[type="radio"]:focus{
        outline:1px solid blue;
    }


  </style>
</head>
<body>
        <input type="text">
        <input type="radio">
</body>
</html>
