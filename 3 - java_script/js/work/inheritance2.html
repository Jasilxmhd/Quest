<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class person{
            constructor (name){
                this.name = name
            }
            study(){
                document.write("hello, i am " + this.name)
            }
        }
        class teacher extends person{
            constructor(name,subject){
                super(name)
                this.subject = subject
            }
            sub(){
                document.write("I am reading an " + this.subject + " book.")
            }
        }
        let tech = new teacher("Jasil","English")
        tech.study();
        document.write("<br>")
        tech.sub();
        
    </script>
</body>
</html>
