<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <link rel="stylesheet" href="calc.css">
  <script src="calc.js" defer></script>
</head>
<body>
  <div class="calculator">
    <input type="text" placeholder="Welcome to Calculator" class="input-box" id="display" disabled>

    <div>
      <button class="operator" onclick="clearall()">AC</button>
      <button class="operator" onclick="backspace()">&#8592;</button>
      <button class="operator" onclick="add('%')">%</button>
      <button class="operator" onclick="add('÷')">÷</button>
    </div>
    <div>
      <button onclick="add(7)">7</button>
      <button onclick="add(8)">8</button>
      <button onclick="add(9)">9</button>
      <button class="operator"  onclick="add('*')">X</button>
    </div>
    <div>
      <button onclick="add(4)">4</button>
      <button onclick="add(5)">5</button>
      <button onclick="add(6)">6</button>
      <button class="operator" onclick="add('-')">-</button>
    </div>
    <div>
      <button onclick="add(1)">1</button>
      <button onclick="add(2)">2</button>
      <button onclick="add(3)">3</button>
      <button class="operator" onclick="add('+')">+</button>
    </div>
    <div>
      <button onclick="add(0)">0</button>
      <button onclick="add('00')">00</button>
      <button onclick="add('.')">.</button>
      <button class="operator" onclick="calculate()">=</button>
    </div>
  </div>
</body>
</html>
