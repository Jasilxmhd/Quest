<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>

    <script>

        let car = ["bmw","benz","audi","ford"];
        console.log(car)
        console.log(car[3])  //accesing 3rd Element

        // change item 
        car [3] = "mazda";
        console.log(car)

        // Check length
        var z = car.length;
        document.write(z + "<br>")   // + <br> its using a print next line
        // console.log(car.length)
        
        // Foor loop
        for(i = 0; i<z; i++){
            document.write(car [i] + "<br>")
        }

        // tap to edit 

    </script>
    
</body>
</html>
