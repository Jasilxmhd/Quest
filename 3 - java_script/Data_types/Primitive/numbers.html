<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let x = 9.9
        let y = 10
        console.log(x)
        console.log(y)

        // String with Numbers 
        let a = "apple"+10
        console.log(a)

        let b = 10+20+"Apple"
        console.log(b)

        let c = "Apple"+10+20
        console.log(c)

        // Numeric Operations
        let w = 50
        let h = 20
        console.log ( w+h )
        console.log ( w-h )
        console.log ( w*h )
        console.log ( w/h )

        // NaN (Not a Number)
        let n = 100/"Apple";
        console.log(isNaN(n))

        let q = NaN;
        let r = 5;
        let s = q+r;
        console.log(s)

        // Check Data Type 
        console.log(typeof(r))
        
    </script>
</body>
</html>
