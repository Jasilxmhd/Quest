<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REGISTRATION</title>

  <style>
  form {
  border: 1px solid #797979;
  border-radius: 10px;
  padding: 20px; 
  width: 300px; 
  margin: auto; 
  background-color: rgba(194, 192, 192, 0.088);
  }


  </style>
</head>
<body>
  
  <h4 style="text-align: center;">Registration Form</h4>

  <form name="RegisterForm" onsubmit="return validateForm()" style="text-align: center;" >

    <label>Name </label>
    <input type="text" name="name" placeholder="Enter Your Name" required><br><br>

    <label>Age</label>
    <input type="number" id="age" required min="18" max="60"><br><br>

    <label>Email </label>
    <input type="email" name="email" placeholder="Enter Your Email" required><br><br>

    <label>Mobile No </label>
    <input type="tel" name="number" placeholder="Enter Mobile No" required><br><br>

    <label>Password </label>
    <input type="password" name="password" placeholder="Enter Your Password"required><br><br>

    <label>Re-Password </label>
    <input type="password" name="password2" placeholder="Re-Enter Your Password" required><br><br>

    <input type="submit" value="Register">
  </form>

  <script>
function validateForm() {
  var name = document.RegisterForm.name.value.trim();
  var regex = /^[A-Za-z]+$/;

  if (!regex.test(name)) {
    alert("Name must contain alphabets only");
    return false;
  }

  var firstpassword = document.RegisterForm.password.value;
  var secondpassword = document.RegisterForm.password2.value;

  if (firstpassword.length < 6) {
    alert("Password must be at least 6 characters");
    return false;
  }

  if (firstpassword !== secondpassword) {
    alert("Passwords must match");
    return false;
  }

  var mobile = document.RegisterForm.number.value;
  if (mobile.length !== 10 || isNaN(mobile)) {
    alert("Mobile number must be exactly 10 digits");
    return false;
  }

  alert("Submitted successfully ✅");
  return true;
}
</script>

</body>
</html>
