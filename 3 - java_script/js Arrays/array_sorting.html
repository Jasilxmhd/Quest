<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

         // Array sorting Accending Order (a - z) / (1 -10)

        let numbers = [30,20,90,80]
        document.write(numbers.sort())

         // Array sorting Deccending Order (z - a) / (10 -1)

        let num = [10,20,40,60]
        num.sort(function(x,y){
            return y-x
        })
        document.write(num)

    </script>
</body>
</html>
