<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = 10
        let b = 10
        let calculator = 3

        switch(calculator){
            case 1:document.write(a+b);
                    break;
            case 2:document.write(a-b);
                    break;
            case 3:document.write(a*b);
                    break;
            case 4:document.write(a/b);
                    break;
            default:document.write("invalid")
        }

    </script>
</body>
</html>
