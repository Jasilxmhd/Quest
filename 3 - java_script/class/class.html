<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        class student{
            
            constructor (name,age){
                this.name = name
                this.age = age
            }
        }
        const std1 = new student("Jasil",21)
        const std2 = new student("Rejin",20)

        document.write(std1.name + "<br>")
        document.write(std1.age + "<br>")

        document.write(std2.name + "<br>")
        document.write(std2.age + "<br>")

    </script>
</body>
</html>
