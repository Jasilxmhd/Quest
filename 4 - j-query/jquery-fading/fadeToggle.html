<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade Toggle</title>
    <script src="jquery.min.js"></script>


    <style>
        #d1{
            width: 80px;
            height: 80px;
            background-color: rgb(11, 101, 170);
        }

    </style>
</head>
<body>
    <button>Fade Toggle</button>
    
    <div id="d1"></div>

</body>

<script>
    $(document).ready(function(){
        $("button").click(function(){
            $("#d1").fadeToggle(3000) //3 seconds
            // $("#d1").fadeToggle()

        });
    });
</script>
</html>
