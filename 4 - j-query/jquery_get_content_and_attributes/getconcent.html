<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="jquery.min.js"></script>
</head>
<body>
    <p id="p1" style="color: blue;">This is a same <b>bold</b> paragraph <br> Helooo </p>
    <button id="b1">Get text</button>
    <button id="b2">Get html</button>

    <script>
        $(document).ready(function(){
            $("#b1").click(function(){
                alert("Text : "+ $("#p1").text())
            })
            $("#b2").click(function(){
                alert("Text : "+ $("#p1").html())
            })
        })
    </script>
</body>
</html>
